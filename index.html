<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Is Kindness — Words of Power</title>

  <!-- Body type -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <!--
    On the live Squarespace site, replace the Google Font links above with
    your Adobe Fonts kit so Orpheus Pro and Adobe Garamond Pro load instead.
    The CSS variables below will pick them up automatically.

    <link rel="stylesheet" href="https://use.typekit.net/XXXXXXX.css" />
  -->

  <style>
    /* ====================================================================
       DESIGN TOKENS — tuned to the Love Is Kindness site
    ==================================================================== */
    :root {
      --black:         #000000;
      --ink:           #0a0a0a;
      --paper:         #f4f0e8;
      --bone:          #e8e1d3;
      --keyline:       rgba(244, 240, 232, 0.12);
      --keyline-soft:  rgba(244, 240, 232, 0.06);

      /* Three ribbon colours from the site */
      --pink:          #e73879;
      --yellow:        #fcc737;
      --purple:        #7e1891;

      /* Tints for highlight blocks (matching the quote callouts on the site) */
      --pink-tint:     #f7c0d3;
      --yellow-tint:   #fde6a0;
      --purple-tint:   #d6c0e4;

      --font-display:  'Orpheus Pro', 'Cormorant Garamond', 'Palatino Linotype', serif;
      --font-body:     'PT Sans', sans-serif;
      --font-meta:     'Adobe Garamond Pro', 'EB Garamond', 'Garamond', serif;
    }

    /* ====================================================================
       RESET & BASE
    ==================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #099696;
      color: var(--paper);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ====================================================================
       LAYOUT — full bleed editorial frame
    ==================================================================== */
    #app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 36px clamp(20px, 4vw, 56px) 48px;
      display: flex;
      flex-direction: column;
    }

    /* Decorative ribbon flourishes removed — keeps bg colour exact */

    /* ====================================================================
       LETTER INDEX — always visible alphabet strip
    ==================================================================== */
    #letter-index {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #099696;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 36px;
      border-top: 1px solid var(--keyline-soft);
      border-bottom: 1px solid var(--keyline-soft);
    }

    .letter-btn {
      flex: 1 1 auto;
      min-width: 32px;
      padding: 14px 4px 12px;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 22px;
      line-height: 1;
      background: transparent;
      border: none;
      border-right: 1px solid var(--keyline-soft);
      color: rgba(244, 240, 232, 0.32);
      cursor: pointer;
      transition: color 0.22s ease, background 0.22s ease, transform 0.22s ease;
      position: relative;
    }
    .letter-btn:last-child { border-right: none; }
    .letter-btn:hover { color: var(--paper); }
    .letter-btn.has-content { color: rgba(244, 240, 232, 0.62); }
    .letter-btn.has-content:hover { color: var(--paper); }

    .letter-btn.active {
      color: var(--paper);
      background: linear-gradient(to bottom, rgba(244, 240, 232, 0.04), transparent);
    }
    .letter-btn.active::after {
      content: '';
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -1px;
      height: 2px;
      background: var(--accent, var(--pink));
    }

    .letter-btn.empty {
      color: rgba(244, 240, 232, 0.18);
    }
    .letter-btn.empty:hover {
      color: rgba(244, 240, 232, 0.45);
    }

    /* ====================================================================
       MAIN STAGE — wheel + word panel
    ==================================================================== */
    #stage {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
      gap: clamp(28px, 4vw, 64px);
      align-items: start;
    }

    /* ── LEFT: wheel ─────────────────────────────────────────────── */
    #wheel-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #wheel-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
    }

    #wheel-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #wheel-canvas:active { cursor: grabbing; }

    /* Centre letter — sized to the wheel's inner radius via JS, but anchored visually here */
    #centre {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      width: 33%;
      height: 33%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #000000;
    }

    #centre-letter {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(72px, 11vw, 130px);
      line-height: 0.85;
      color: var(--paper);
      user-select: none;
      transform-origin: center;
      animation: letterIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes letterIn {
      from { opacity: 0; transform: scale(0.78) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 12px 26px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      transition: all 0.25s ease;
      line-height: 1;
    }

    #spin-btn {
      background: var(--paper);
      color: var(--ink);
      border-color: var(--paper);
      font-weight: 500;
    }
    #spin-btn:hover:not(:disabled) {
      background: var(--accent, var(--pink));
      border-color: var(--accent, var(--pink));
      color: var(--paper);
    }
    #spin-btn:disabled { opacity: 0.4; cursor: default; }

    #landed {
      margin-top: 4px;
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: rgba(244, 240, 232, 0.35);
      min-height: 18px;
      text-align: center;
      display: none;
    }
    #landed strong {
      color: var(--paper);
      font-weight: 400;
    }

    /* ── RIGHT: word panel ───────────────────────────────────────── */
    #panel {
      position: relative;
      padding: 4px 0 0;
      min-height: 480px;
    }

    #panel-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 18px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--keyline);
    }

    .meta-label {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(244, 240, 232, 0.5);
    }
    .meta-label .meta-letter {
      color: var(--accent, var(--pink));
      font-style: normal;
      letter-spacing: 0.1em;
    }

    .meta-count {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(244, 240, 232, 0.4);
    }
    #meta-count { display: none; }

    /* Empty / waiting state */
    #empty-state {
      padding: 0;
    }
    #empty-state.hidden { display: none; }

    #empty-pretitle {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(244, 240, 232, 0.4);
      margin-bottom: 16px;
    }

    #empty-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(32px, 4.4vw, 50px);
      line-height: 1.05;
      color: var(--paper);
      margin-bottom: 18px;
      max-width: 22ch;
    }
    #empty-title em {
      font-style: italic;
      color: var(--accent, var(--pink));
    }

    #empty-body {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 17px;
      line-height: 1.6;
      color: rgba(244, 240, 232, 0.55);
      max-width: 38ch;
    }

    /* Coming-soon state (letter has no words yet) */
    #coming-state { display: none; padding: 36px 0; }
    #coming-state.visible { display: block; }

    #coming-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-style: italic;
      font-size: clamp(28px, 3.4vw, 38px);
      color: var(--paper);
      margin-bottom: 14px;
    }
    #coming-body {
      font-family: var(--font-meta);
      font-style: italic;
      font-size: 16px;
      line-height: 1.6;
      color: rgba(244, 240, 232, 0.5);
      max-width: 40ch;
    }

    /* Word reveal state */
    #word-state {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition:
        opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #word-state.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    #word-eyebrow {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0.005em;
      line-height: 1;
      color: var(--paper);
      margin-bottom: 22px;
    }
    #word-eyebrow em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent, var(--pink));
    }

    #word-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(56px, 8vw, 96px);
      line-height: 1.1;
      color: var(--accent, var(--pink));
      letter-spacing: -0.005em;
      display: inline-block;
      background: #000000;
      padding: 4px 14px 8px 14px;
      /* Start fully clipped — grows left-to-right on reveal */
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
    }
    #word-state.visible #word-title {
      clip-path: inset(0 0% 0 0);
    }

    /* ====================================================================
       RESPONSIVE
    ==================================================================== */
    @media (max-width: 900px) {
      #stage { grid-template-columns: 1fr; gap: 36px; }
      #wheel-col { max-width: 480px; margin: 0 auto; }
      #panel { min-height: auto; }
    }

    @media (max-width: 600px) {
      #app { padding: 24px 16px 36px; }
      .letter-btn { font-size: 14px; padding: 10px 2px; }
      #word-title { font-size: clamp(44px, 12vw, 70px); }
      #empty-title { font-size: clamp(28px, 8vw, 40px); }
    }

    @media (max-width: 420px) {
      .letter-btn { min-width: 0; padding: 10px 2px; font-size: 15px; }
    }

    /* ── Dev-tools colour picker ──────────────────────────────────── */
    #devtools-btn {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 999;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #devtools-btn:hover { background: rgba(0,0,0,0.75); color: #fff; }

    #devtools-panel {
      display: none;
      position: fixed;
      bottom: 64px;
      right: 18px;
      z-index: 998;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 200px;
      font-family: 'PT Sans', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    #devtools-panel.open { display: block; }
    #devtools-panel h4 {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      font-weight: 400;
    }
    .dt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }
    .dt-row:last-child { margin-bottom: 0; }
    .dt-row label { flex: 1; }
    .dt-row input[type="color"] {
      width: 36px;
      height: 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      background: none;
      flex-shrink: 0;
    }
    .dt-hex {
      width: 72px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      color: rgba(255,255,255,0.85);
      font-family: monospace;
      font-size: 12px;
      padding: 3px 6px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .dt-hex:focus { outline: none; border-color: rgba(255,255,255,0.5); }
  </style>
</head>

<body>

<div id="app">



  <!-- ── Alphabet index ─────────────────────────────────────────── -->
  <nav id="letter-index" aria-label="Choose a letter"></nav>

  <!-- ── Stage ──────────────────────────────────────────────────── -->
  <main id="stage">

    <!-- LEFT — wheel -->
    <section id="wheel-col">
      <div id="wheel-wrapper">
        <canvas id="wheel-canvas" aria-label="Words of Power wheel"></canvas>
        <div id="centre">
          <span id="centre-letter">A</span>
        </div>
      </div>

      <div id="controls">
        <button id="spin-btn" class="btn">Spin</button>
      </div>

      <div id="landed" aria-live="polite"></div>
    </section>

    <!-- RIGHT — panel -->
    <aside id="panel">

      <div id="panel-meta">
        <span class="meta-label">Letter <span class="meta-letter" id="meta-letter">A</span></span>
        <span class="meta-count" id="meta-count">— words</span>
      </div>

      <!-- Empty (initial) -->
      <div id="empty-state"></div>

      <!-- Coming soon (letters F–Z) -->
      <div id="coming-state">
        <div id="empty-pretitle">In the works</div>
        <h2 id="coming-title">This letter is on its way.</h2>
        <p id="coming-body">
          We're still placing words behind this letter. Try A through E for now — and we'll let you know when the rest open up.
        </p>
      </div>

      <!-- Word -->
      <div id="word-state" aria-live="polite">
        <div id="word-eyebrow">Affirm, I am:</div>
        <h2 id="word-title"></h2>
      </div>

    </aside>
  </main>

  <!-- ── Dev-tools colour picker ──────────────────────────────── -->
  <button id="devtools-btn" title="Developer colour tools" aria-label="Open colour tools">&#9881;</button>
  <div id="devtools-panel">
    <h4>Wheel Colours</h4>
    <div class="dt-row">
      <label>Pink</label>
      <input type="color" id="dt-pink" value="#e73879" />
      <input type="text" class="dt-hex" id="dt-pink-hex" value="#E73879" maxlength="7" />
    </div>
    <div class="dt-row">
      <label>Yellow</label>
      <input type="color" id="dt-yellow" value="#fcc737" />
      <input type="text" class="dt-hex" id="dt-yellow-hex" value="#FCC737" maxlength="7" />
    </div>
    <div class="dt-row">
      <label>Purple</label>
      <input type="color" id="dt-purple" value="#7e1891" />
      <input type="text" class="dt-hex" id="dt-purple-hex" value="#7E1891" maxlength="7" />
    </div>
  </div>
</div>

==================================================================== */

   SECTION 1 — LETTER ACCENTS

==================================================================== */

  LETTER_ACCENT[l] = ACCENT_CYCLE[i % 3];
});

/* ====================================================================
   SECTION 3 — ENGINE

(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────────────── */
  var index       = document.getElementById('letter-index');
  var canvas      = document.getElementById('wheel-canvas');
  var ctx         = canvas.getContext('2d');
  var wrapper     = document.getElementById('wheel-wrapper');
  var centreLet   = document.getElementById('centre-letter');
  var spinBtn     = document.getElementById('spin-btn');
  var landed      = document.getElementById('landed');

  var metaLetter  = document.getElementById('meta-letter');
  var metaCount   = document.getElementById('meta-count');

  var emptyState  = document.getElementById('empty-state');
  var comingState = document.getElementById('coming-state');
  var wordState   = document.getElementById('word-state');
  var wordTitle   = document.getElementById('word-title');

  /* ── State ────────────────────────────────────────────────── */
  var curLetter = 'A';
  var rotation  = 0;
  var animating = false;
  var animFrom = 0, animTo = 0, animStart = null, animDur = 0, animRaf = null, animCb = null;
  var selIdx    = -1;
  var spinDone  = false;
  var SIZE      = 0;
  var dpr       = Math.max(1, window.devicePixelRatio || 1);

  /* ── Build alphabet index ─────────────────────────────────── */
  function buildIndex () {
    var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letters.forEach(function (l) {
      var btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.type = 'text';
      btn.textContent = l;
      btn.setAttribute('data-letter', l);
      btn.setAttribute('aria-label', 'Letter ' + l);

      var hasWords = WORDS[l] && WORDS[l].length > 0;
      if (hasWords) btn.classList.add('has-content');
      else          btn.classList.add('empty');

      btn.addEventListener('click', function () { selectLetter(l); });
      index.appendChild(btn);
    });
  }

  /* ── Letter selection ─────────────────────────────────────── */
  function selectLetter (l) {
    if (animating) return;
    curLetter = l;
    rotation  = 0;
    selIdx    = -1;
    spinDone  = false;

    /* Update accent CSS var so buttons + word colour adopt the letter's hue */
    var accent = LETTER_ACCENT[l] || '#e73879';
    document.documentElement.style.setProperty('--accent', accent);

    /* Index state */
    Array.prototype.forEach.call(index.children, function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-letter') === l);
    });

    /* Centre letter */
    centreLet.textContent = l;
    centreLet.style.animation = 'none';
    /* re-trigger */ void centreLet.offsetWidth;
    centreLet.style.animation = 'letterIn 0.55s cubic-bezier(0.22,1,0.36,1) both';

    /* Panel meta */
    metaLetter.textContent = l;
    var entries = WORDS[l] || [];
    metaCount.textContent = entries.length
      ? entries.length + (entries.length === 1 ? ' word' : ' words')
      : 'coming soon';

    /* Panel state */
    wordState.classList.remove('visible');
    wordState.style.display = 'none';
    landed.innerHTML = '';

    if (entries.length === 0) {
      emptyState.classList.add('hidden');
      comingState.classList.add('visible');
      spinBtn.disabled = true;
    } else {
      comingState.classList.remove('visible');
      emptyState.classList.remove('hidden');
      spinBtn.disabled = false;
    }

    draw();
    emit('letterChanged', { letter: l });
  }

  /* ── Canvas sizing (HiDPI safe) ───────────────────────────── */
  function syncSize () {
    var rect = wrapper.getBoundingClientRect();
    SIZE = Math.max(280, rect.width);
    canvas.width  = SIZE * dpr;
    canvas.height = SIZE * dpr;
    canvas.style.width  = SIZE + 'px';
    canvas.style.height = SIZE + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  /* ── Spin ─────────────────────────────────────────────────── */
  function doSpin () {
    if (animating) return;
    var entries = WORDS[curLetter] || [];
    if (entries.length === 0) return;

    var rnd = Math.floor(Math.random() * entries.length);
    selIdx  = rnd;
    spinDone = false;
    wordState.classList.remove('visible');
    wordState.style.display = 'none';
    emptyState.classList.add('hidden');
    landed.innerHTML = '';

    var target = computeTarget(rnd, entries.length, rotation, 5 + Math.random() * 2);
    spinBtn.disabled = true;
    beginSpin(target, 4400, function () {
      spinBtn.disabled = false;
      spinDone = true;
      showWord(entries[rnd]);
    });
  }

  function computeTarget (wordIdx, n, curRot, minSpins) {
    var seg  = (2 * Math.PI) / n;
    /* Pointer at top (-PI/2). Land midpoint of segment under pointer. */
    var base = -Math.PI / 2 - wordIdx * seg - seg / 2;
    var min  = curRot + minSpins * 2 * Math.PI;
    var k    = Math.ceil((min - base) / (2 * Math.PI));
    return base + k * 2 * Math.PI;
  }

  function beginSpin (to, dur, cb) {
    if (animRaf) cancelAnimationFrame(animRaf);
    animating = true;
    animFrom  = rotation;
    animTo    = to;
    animDur   = dur;
    animStart = null;
    animCb    = cb;
    animRaf   = requestAnimationFrame(tick);
  }

  function tick (ts) {
    if (!animStart) animStart = ts;
    var t = Math.min((ts - animStart) / animDur, 1);
    rotation = animFrom + (animTo - animFrom) * easeOutQuart(t);
    draw();
    if (t < 1) {
      animRaf = requestAnimationFrame(tick);
    } else {
      rotation  = animTo;
      animating = false;
      animRaf   = null;
      draw();
      if (animCb) animCb();
    }
  }

  function easeOutQuart (t) { return 1 - Math.pow(1 - t, 4); }

  /* ── Show / hide word ─────────────────────────────────────── */
  function showWord (entry) {
    /* Colour the word to match its wheel segment (cycles pink → yellow → purple) */
    var cs = getComputedStyle(document.documentElement);
    var segColours = [
      cs.getPropertyValue('--pink').trim()   || '#e73879',
      cs.getPropertyValue('--yellow').trim() || '#fcc737',
      cs.getPropertyValue('--purple').trim() || '#7e1891'
    ];
    wordTitle.style.color = segColours[selIdx % 3];

    wordTitle.textContent = entry;
    landed.innerHTML      = 'Your word is <strong>' + entry + '</strong>';

    emptyState.classList.add('hidden');
    comingState.classList.remove('visible');
    wordState.style.display = 'block';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { wordState.classList.add('visible'); });
    });
    speakWord(entry);
    emit('wordSelected', { letter: curLetter, word: entry });
  }

  /* ── Voice — calm female TTS via Web Speech API ──────────── */
  function speakWord (word) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();

    var utter = new SpeechSynthesisUtterance('I am ' + word);
    utter.rate   = 0.82;
    utter.pitch  = 1.05;
    utter.volume = 1;

    /* Ordered preference list — calm, female, English voices */
    var preferred = [
      'Google UK English Female',
      'Samantha',
      'Microsoft Zira - Desktop',
      'Microsoft Zira',
      'Karen',
      'Moira',
      'Tessa',
      'Google US English'
    ];

    function pickVoice (voices) {
      var i, j;
      for (i = 0; i < preferred.length; i++) {
        for (j = 0; j < voices.length; j++) {
          if (voices[j].name === preferred[i]) return voices[j];
        }
      }
      for (j = 0; j < voices.length; j++) {
        if (/female/i.test(voices[j].name)) return voices[j];
      }
      for (j = 0; j < voices.length; j++) {
        if (/^en[-_]/i.test(voices[j].lang)) return voices[j];
      }
      return voices[0] || null;
    }

    function doSpeak () {
      var voices = window.speechSynthesis.getVoices();
      var chosen = pickVoice(voices);
      if (chosen) utter.voice = chosen;
      window.speechSynthesis.speak(utter);
    }

    var voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      doSpeak();
    } else {
      window.speechSynthesis.onvoiceschanged = function () {
        window.speechSynthesis.onvoiceschanged = null;
        doSpeak();
      };
    }
  }

  function resetPanel () {
    rotation = 0;
    selIdx = -1;
    spinDone = false;
    wordState.classList.remove('visible');
    wordState.style.display = 'none';
    var hasWords = WORDS[curLetter] && WORDS[curLetter].length > 0;
    if (hasWords) emptyState.classList.remove('hidden');
    landed.innerHTML = '';
    draw();
  }

  /* ── Word index under pointer ─────────────────────────────── */
  function wordAtPointer (n, seg) {
    var raw = ((-Math.PI / 2) - rotation) / seg;
    return ((Math.floor(raw) % n) + n) % n;
  }

  /* ── Draw the wheel ───────────────────────────────────────── */
  function draw () {
    if (SIZE === 0) return;
    ctx.clearRect(0, 0, SIZE, SIZE);

    var cx = SIZE / 2;
    var cy = SIZE / 2;
    var outerR = SIZE * 0.485;
    var ringR  = SIZE * 0.46;
    var innerR = SIZE * 0.18;

    var entries = WORDS[curLetter] || [];
    var n = entries.length;
    var accent = LETTER_ACCENT[curLetter] || '#e73879';

    /* Background disc — soft warm wash so empty wheels still feel alive */
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
    var bgGrad = ctx.createRadialGradient(cx, cy, innerR * 0.4, cx, cy, outerR);
    bgGrad.addColorStop(0, 'rgba(244,240,232,0.025)');
    bgGrad.addColorStop(1, 'rgba(244,240,232,0.005)');
    ctx.fillStyle = bgGrad;
    ctx.fill();

    if (n === 0) {
      /* "Coming soon" wheel: gentle dashed ring + faint glyph */
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
      ctx.setLineDash([2, 10]);
      ctx.strokeStyle = 'rgba(244,240,232,0.18)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.restore();

      /* Soft accent halo */
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, ringR + SIZE * 0.012, 0, Math.PI * 2);
      ctx.strokeStyle = hexAlpha(accent, 0.18);
      ctx.lineWidth = SIZE * 0.003;
      ctx.stroke();
      ctx.restore();

      drawPointer(ctx, cx, cy, ringR, SIZE, accent, 0.35);
      return;
    }

    var seg = (2 * Math.PI) / n;
    var atPtr = wordAtPointer(n, seg);

    /* Segment palette — full brand colours as on the A-Z road page */
    var _cs = getComputedStyle(document.documentElement);
    var SEG_TINTS = [
      (_cs.getPropertyValue('--pink').trim()   || '#e73879'),
      (_cs.getPropertyValue('--yellow').trim() || '#fcc737'),
      (_cs.getPropertyValue('--purple').trim() || '#7e1891')
    ];
    var SEG_HI = [
      '#ff6aaa',  /* bright pink   */
      '#ffe166',  /* bright yellow */
      '#b030d8'   /* bright purple */
    ];

    /* Segments */
    for (var i = 0; i < n; i++) {
      var a0 = rotation + i * seg;
      var a1 = a0 + seg;
      var mid = a0 + seg / 2;
      var tintIdx = i % 3;
      var hi = (i === atPtr && animating) || (spinDone && i === selIdx);

      ctx.save();
      if (hi) { ctx.shadowColor = accent; ctx.shadowBlur = SIZE * 0.025; }
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, ringR, a0, a1);
      ctx.closePath();
      ctx.fillStyle = hi ? SEG_HI[tintIdx] : SEG_TINTS[tintIdx];
      ctx.fill();
      ctx.restore();

      /* Hairline divider between segments — fades as density grows */
      var divAlpha = n > 40 ? 0.04 : n > 24 ? 0.06 : 0.08;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(a0);
      ctx.beginPath();
      ctx.moveTo(innerR * 1.04, 0);
      ctx.lineTo(ringR, 0);
      ctx.strokeStyle = 'rgba(244,240,232,' + divAlpha + ')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.restore();

      drawSegText(ctx, entries[i], cx, cy, innerR, ringR, mid, hi, SIZE, n);
    }

    /* Outer ring(s) — black lines */
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, ringR + SIZE * 0.018, 0, Math.PI * 2);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = SIZE * 0.005;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, ringR + SIZE * 0.032, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = SIZE * 0.003;
    ctx.stroke();
    ctx.restore();

    /* Black filled centre circle */
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.fillStyle = '#000000';
    ctx.fill();
    ctx.restore();

    /* Inner ring around centre letter — black */
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = SIZE * 0.006;
    ctx.stroke();
    ctx.restore();

    /* Pointer */
    drawPointer(ctx, cx, cy, ringR, SIZE, accent, 1);
  }

  function drawSegText (ctx, word, cx, cy, innerR, outerR, midAngle, hi, SIZE, n) {
    var textEdge = outerR - SIZE * 0.028;
    var maxW     = textEdge - innerR - SIZE * 0.02;
    /* Scale font to segment arc height so words always fit comfortably */
    var midR     = (innerR + outerR) / 2;
    var segArcH  = midR * (2 * Math.PI / n);
    var fs       = Math.max(7, Math.min(SIZE * 0.032, segArcH * 0.78, 18));

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(midAngle);
    ctx.font = (hi ? '700 ' : '400 ') + fs + "px 'PT Sans', sans-serif";
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';

    var mw = ctx.measureText(word).width;
    if (mw > maxW) {
      var s = maxW / mw;
      ctx.scale(s, s);
      ctx.fillText(word, textEdge / s, 0);
    } else {
      ctx.fillText(word, textEdge, 0);
    }
    ctx.restore();
  }

  function drawPointer (ctx, cx, cy, outerR, SIZE, accent, opacity) {
    var tipY = cy - outerR - SIZE * 0.006;
    var pw = SIZE * 0.022;
    var ph = SIZE * 0.034;

    ctx.save();
    ctx.globalAlpha = opacity;

    /* Soft shadow */
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = SIZE * 0.012;

    /* Triangle */
    ctx.beginPath();
    ctx.moveTo(cx, tipY);
    ctx.lineTo(cx - pw, tipY - ph);
    ctx.lineTo(cx + pw, tipY - ph);
    ctx.closePath();
    ctx.fillStyle = '#f4f0e8';
    ctx.fill();

    /* Accent jewel above pointer */
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(cx, tipY - ph - SIZE * 0.012, SIZE * 0.0085, 0, Math.PI * 2);
    ctx.fillStyle = accent;
    ctx.fill();

    ctx.restore();
  }

  /* ── Colour helpers ───────────────────────────────────────── */
  function hexToRgb (hex) {
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
  }
  function hexAlpha (hex, a) {
    var c = hexToRgb(hex);
    if (!c) return hex;
    return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
  }

  /* ── postMessage bridge (Squarespace iframe) ──────────────── */
  function emit (type, payload) {
    try {
      if (window.parent !== window) {
        var msg = { type: type };
        Object.keys(payload || {}).forEach(function (k) { msg[k] = payload[k]; });
        window.parent.postMessage(msg, '*');
      }
    } catch (_) {}
  }

  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === 'selectLetter' && typeof d.letter === 'string')
      selectLetter(d.letter.trim().toUpperCase().charAt(0));
    else if (d.type === 'spin') doSpin();
  });

  /* ── Wire up controls ─────────────────────────────────────── */
  spinBtn.addEventListener('click', function () {
    /* iOS Safari requires speechSynthesis to be called synchronously from a
       user-gesture handler. Prime it here so the deferred speak() after the
       spin animation is allowed. */
    if (window.speechSynthesis) {
      var primer = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(primer);
      window.speechSynthesis.cancel();
    }
    doSpin();
  });

  /* Optional: click on canvas centre also spins */
  canvas.addEventListener('click', function (e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var dx = x - rect.width / 2;
    var dy = y - rect.height / 2;
    if (Math.sqrt(dx * dx + dy * dy) < rect.width * 0.18) {
      doSpin();
    }
  });

  /* ── Init ─────────────────────────────────────────────────── */
  buildIndex();

  if (window.ResizeObserver) {
    new ResizeObserver(syncSize).observe(wrapper);
  } else {
    window.addEventListener('resize', syncSize);
  }

  /* Tiny delay so fonts can load before first draw */
  requestAnimationFrame(function () {
    syncSize();
    selectLetter('A');
  });

}());

  /* ── Dev-tools colour picker ────────────────────────────────── */
  (function () {
    var btn    = document.getElementById('devtools-btn');
    var panel  = document.getElementById('devtools-panel');
    var root   = document.documentElement;

    btn.addEventListener('click', function () {
      panel.classList.toggle('open');
    });

    function applyColour(varName, val) {
      root.style.setProperty(varName, val);
      if (typeof draw === 'function') draw();
    }

    function wireColour(swatchId, hexId, varName) {
      var swatch = document.getElementById(swatchId);
      var hex    = document.getElementById(hexId);

      swatch.addEventListener('input', function () {
        applyColour(varName, swatch.value);
        hex.value = swatch.value.toUpperCase();
      });

      hex.addEventListener('input', function () {
        var v = hex.value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) {
          swatch.value = v;
          applyColour(varName, v);
        }
      });

      hex.addEventListener('blur', function () {
        /* snap display back to swatch value if hex was invalid */
        hex.value = swatch.value.toUpperCase();
      });
    }

    wireColour('dt-pink',   'dt-pink-hex',   '--pink');
    wireColour('dt-yellow', 'dt-yellow-hex', '--yellow');
    wireColour('dt-purple', 'dt-purple-hex', '--purple');
  }());
</script>
</body>
</html>
