<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Is Kindness — Words of Power</title>

  <!-- PT Sans — Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet" />

  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  ADOBE FONTS — Add your kit link for:                       ║
  ║    Orpheus Pro  •  Adobe Garamond Pro                       ║
  ║  <link rel="stylesheet" href="https://use.typekit.net/XXXXXXX.css" /> ║
  ╚══════════════════════════════════════════════════════════════╝
  -->

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --black:        #000000;
      --white:        #f2f2f2;
      --keyline:      #cccccc;
      --pink:         #e73879;
      --yellow:       #fcc737;
      --purple:       #7e1891;
      --accent:       #e73879;
      --accent-faint: rgba(231,56,121,0.08);

      --font-heading: 'Orpheus Pro', 'Palatino Linotype', 'Palatino', serif;
      --font-body:    'PT Sans', sans-serif;
      --font-meta:    'Adobe Garamond Pro', 'Adobe Garamond', 'Garamond', serif;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ============================================================
       APP — two-column layout
    ============================================================ */
    #app {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      width: 100%;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ─────────────────────────────────────────── */
    #left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 36px;
      flex-shrink: 0;
      width: 46%;
      max-width: 480px;
      min-width: 280px;
    }

    #current-letter-badge {
      font-family: var(--font-meta);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(242,242,242,0.32);
      margin-bottom: 14px;
      align-self: flex-start;
    }
    #current-letter-badge span { color: var(--accent); }

    /* Wheel */
    #wheel-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
    }

    #wheel-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #center-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #letter-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #letter-image.visible { opacity: 1; }

    #letter-fallback {
      font-family: var(--font-heading);
      font-weight: 400;
      color: var(--white);
      line-height: 1;
      user-select: none;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
    }

    .ctrl-btn {
      font-family: var(--font-meta);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      padding: 9px 28px;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    #spin-btn {
      background: var(--accent);
      color: var(--black);
      border-color: var(--accent);
      font-weight: 700;
    }
    #spin-btn:hover:not(:disabled) { filter: brightness(1.12); }
    #spin-btn:disabled { opacity: 0.28; cursor: default; }

    #switch-btn {
      background: transparent;
      color: rgba(242,242,242,0.5);
      border-color: rgba(242,242,242,0.16);
    }
    #switch-btn:hover { border-color: rgba(242,242,242,0.38); color: var(--white); }
    #switch-btn.active { border-color: var(--accent); color: var(--accent); }

    /* Landed label */
    #landed-label {
      font-family: var(--font-meta);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(242,242,242,0.26);
      margin-top: 12px;
      min-height: 16px;
      text-align: center;
    }
    #landed-label span { color: rgba(242,242,242,0.5); }

    /* Letter nav */
    #letter-nav {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      margin-top: 16px;
      width: 100%;
    }
    #letter-nav.open { display: flex; }

    .letter-btn {
      font-family: var(--font-meta);
      font-size: 11px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(242,242,242,0.1);
      background: transparent;
      color: rgba(242,242,242,0.35);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .letter-btn:hover { border-color: rgba(242,242,242,0.3); color: var(--white); }
    .letter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

    /* ── RIGHT PANEL ────────────────────────────────────────── */
    #right-panel {
      flex: 1;
      min-height: 100vh;
      border-left: 1px solid rgba(204,204,204,0.1);
      display: flex;
      flex-direction: column;
      padding: 32px 36px 40px;
    }

    /* Panel header */
    #panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    #panel-meta-label {
      font-family: var(--font-meta);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(204,204,204,0.45);
    }

    #list-badge {
      font-family: var(--font-meta);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(204,204,204,0.35);
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      flex-direction: column;
      padding: 20px 0 40px;
    }
    #empty-state.hidden { display: none; }

    #empty-state p {
      font-family: var(--font-meta);
      font-size: 15px;
      letter-spacing: 0.04em;
      color: rgba(204,204,204,0.25);
      line-height: 1.8;
    }

    /* Word state */
    #word-state {
      display: none;
      flex-direction: column;
      opacity: 0;
      transform: translateY(14px);
      transition:
        opacity   0.52s cubic-bezier(0.22,1,0.36,1),
        transform 0.52s cubic-bezier(0.22,1,0.36,1);
    }
    #word-state.visible {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    /* Word heading */
    #word-title {
      font-family: var(--font-heading);
      font-size: clamp(38px, 5.5vw, 60px);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--accent);
      line-height: 1.05;
      margin-bottom: 14px;
      transition: color 0.3s ease;
    }

    /* Description */
    #word-desc {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.78;
      color: rgba(242,242,242,0.68);
      margin-bottom: 28px;
    }

    /* Divider */
    .panel-divider {
      width: 36px;
      height: 1px;
      background: rgba(204,204,204,0.18);
      margin-bottom: 24px;
    }

    /* Steps */
    #word-steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-meta);
      font-size: 10.5px;
      letter-spacing: 0.01em;
      margin-top: 2px;
    }
    .step-num.n1 { color: var(--pink);   border: 1px solid var(--pink);   }
    .step-num.n2 { color: var(--yellow); border: 1px solid var(--yellow); }
    .step-num.n3 { color: var(--purple); border: 1px solid var(--purple); }

    .step p {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.68;
      color: rgba(242,242,242,0.58);
    }

    /* ============================================================
       MOBILE — stack below 700 px
    ============================================================ */
    @media (max-width: 700px) {
      #app { flex-direction: column; min-height: auto; }
      #left-panel  { width: 100%; max-width: 100%; padding: 24px 20px 20px; }
      #right-panel { border-left: none; border-top: 1px solid rgba(204,204,204,0.1); min-height: auto; padding: 28px 20px 36px; }
      #panel-head  { margin-bottom: 24px; }
    }

    @media (max-width: 400px) {
      .letter-btn  { width: 24px; height: 24px; font-size: 10px; }
      #left-panel  { padding: 16px 14px; }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ── LEFT: WHEEL ─────────────────────────────────────────── -->
  <div id="left-panel">

    <p id="current-letter-badge">Words of Power — <span id="badge-letter">L</span></p>

    <div id="wheel-wrapper">
      <canvas id="wheel-canvas" aria-label="Spinning word wheel"></canvas>
      <div id="center-overlay" aria-hidden="true">
        <img id="letter-image" src="" alt="" />
        <span id="letter-fallback"></span>
      </div>
    </div>

    <div id="controls">
      <button id="spin-btn"   class="ctrl-btn">Spin</button>
      <button id="switch-btn" class="ctrl-btn">Switch list</button>
    </div>

    <p id="landed-label"></p>

    <nav id="letter-nav" aria-label="Select a letter"></nav>

  </div>

  <!-- ── RIGHT: DESCRIPTION ──────────────────────────────────── -->
  <div id="right-panel">

    <div id="panel-head">
      <span id="panel-meta-label">Selected Word</span>
      <span id="list-badge">L List</span>
    </div>

    <div id="empty-state" aria-live="polite">
      <p>Spin the wheel to<br>discover your word.</p>
    </div>

    <div id="word-state" aria-live="polite">
      <h2 id="word-title"></h2>
      <p  id="word-desc"></p>
      <div class="panel-divider"></div>
      <div id="word-steps">
        <div class="step"><span class="step-num n1">1</span><p id="step-1"></p></div>
        <div class="step"><span class="step-num n2">2</span><p id="step-2"></p></div>
        <div class="step"><span class="step-num n3">3</span><p id="step-3"></p></div>
      </div>
    </div>

  </div>

</div>

<script>
/* ====================================================================
   LOVE IS KINDNESS — Words of Power  v2
   ─────────────────────────────────────────────────────────────────
   Parent-page integration (Squarespace iframe):
     iframe.contentWindow.postMessage({ type: 'selectLetter', letter: 'A' }, '*');
     iframe.contentWindow.postMessage({ type: 'spin' }, '*');

   Events emitted to parent:
     { type: 'letterChanged', letter: 'A' }
     { type: 'wordSelected',  letter: 'A', word: 'Abundant' }
==================================================================== */

/* ====================================================================
   SECTION 1 — WORDS
   ─────────────────────────────────────────────────────────────────
   ⚠️  The .pages file uses a binary format that couldn't be fully
       decoded. Please replace the placeholder content below with
       your exact words, descriptions and prompts.

   Each entry:
     word        — shown on the wheel and as the panel heading
     description — one punchy sentence definition
     steps       — exactly 3 short actionable prompts
==================================================================== */
const WORDS = {
  A: [
    { word: 'Authentic',   description: 'Authentic is showing up as your full, unfiltered self without apology.',          steps: ['Notice one way you are performing rather than being.', 'Share one true thought you have been holding back.', 'Choose honesty over comfort in one interaction today.'] },
    { word: 'Abundant',    description: 'Abundant is recognising the overflow already present in your life.',              steps: ['List three things you already have more than enough of.', 'Give one of them to someone who needs it.', 'Say aloud: I have enough. I am enough. Right now.'] },
    { word: 'Assertive',   description: 'Assertive is knowing your worth and speaking it clearly.',                        steps: ['Identify one boundary you have been avoiding setting.', 'Write a one-sentence statement that holds that boundary.', 'Use that sentence the next time it is needed.'] },
    { word: 'Altruistic',  description: 'Altruistic is giving without keeping score.',                                    steps: ['Do one kind thing today with no expectation of return.', 'Notice how it feels in your body.', 'Let it end there — no story, no reward needed.'] },
    { word: 'Adventurous', description: 'Adventurous is saying yes before you feel completely ready.',                    steps: ['Identify one thing you have been waiting to feel ready for.', 'Take the first, smallest action toward it today.', 'Notice that readiness follows movement, not the other way around.'] },
    { word: 'Aligned',     description: 'Aligned is when your actions, words and values point the same way.',             steps: ['Write down your top three values.', 'Check one decision you made this week against them.', 'Make one small adjustment to close any gap you find.'] }
  ],
  B: [
    { word: 'Brave',       description: 'Brave is doing the right thing before you feel ready.',                          steps: ['Name the thing you are avoiding.', 'Take the smallest first step.', 'Reward the action, not the outcome.'] },
    { word: 'Brilliant',   description: 'Brilliant is the light you carry that no one else can replicate.',               steps: ['Name one thing you do effortlessly that others find difficult.', 'Let yourself call that a gift, not a given.', 'Use it intentionally once today.'] },
    { word: 'Balanced',    description: 'Balanced is not having it all at once — it is knowing how to return to centre.', steps: ['Identify the area of your life most out of balance right now.', 'Name one thing you could add or remove to restore flow.', 'Do one small thing toward that shift today.'] },
    { word: 'Benevolent',  description: 'Benevolent is the quiet warmth you extend to the world, without condition.',     steps: ['Offer something kind to a stranger today.', 'Notice your impulse to judge and replace it with curiosity.', 'Practice this three times before the day ends.'] },
    { word: 'Buoyant',     description: 'Buoyant is the ability to rise back to the surface, every single time.',         steps: ['Recall a time you recovered from something that nearly broke you.', 'Write down what carried you through.', 'Carry that forward as evidence of your strength.'] },
    { word: 'Bodacious',   description: 'Bodacious is living boldly, loudly, and entirely on your own terms.',            steps: ['Do one thing today the smaller version of you would not dare to.', 'Own the room — or at least your corner of it.', 'Let your presence be a gift, unapologetically.'] }
  ],
  C: [
    { word: 'Compassionate', description: 'Compassionate is holding space for someone\'s pain without trying to fix it.',   steps: ['Listen to someone fully today without offering a solution.', 'Ask: what do you need from me right now?', 'Honour whatever their answer is.'] },
    { word: 'Courageous',    description: 'Courageous is walking forward while the fear is still present.',                 steps: ['Identify one fear that is keeping you small.', 'Ask: what is the worst realistic outcome?', 'Act as if the answer is survivable — because it is.'] },
    { word: 'Creative',      description: 'Creative is the willingness to make something where nothing existed before.',    steps: ['Give yourself ten minutes to create with no purpose or outcome.', 'Let it be messy, incomplete, just yours.', 'Notice what it feels like to make without performing.'] },
    { word: 'Connected',     description: 'Connected is the feeling that you belong, both to yourself and to others.',     steps: ['Reach out to one person you have been meaning to contact.', 'Be fully present — no screens — in one conversation today.', 'Notice what shifts when you are truly seen.'] },
    { word: 'Clear',         description: 'Clear is knowing what you want and finding the courage to say so.',             steps: ['Write one thing you want that you have not said out loud.', 'Say it out loud now — to yourself.', 'Take one action that moves toward it.'] }
  ],
  D: [
    { word: 'Devoted',     description: 'Devoted is showing up for what matters, especially when it is inconvenient.',    steps: ['Name one commitment you have been giving less than it deserves.', 'Give it your full presence for thirty minutes today.', 'Let that be enough for now.'] },
    { word: 'Determined',  description: 'Determined is the part of you that keeps going when logic says stop.',           steps: ['Revisit one goal you have quietly given up on.', 'Ask: is it truly finished, or just uncomfortable?', 'Take one step forward to find out.'] },
    { word: 'Dignified',   description: 'Dignified is carrying yourself as though you have always been worthy.',          steps: ['Notice one way you are shrinking yourself today.', 'Stand taller — physically and emotionally — in that moment.', 'Speak to yourself the way you would speak to someone you deeply respect.'] },
    { word: 'Delightful',  description: 'Delightful is radiating joy so freely that others catch it without trying.',     steps: ['Laugh at something small today.', 'Share something that made you smile with someone else.', 'Let pleasure be enough reason to do something today.'] },
    { word: 'Driven',      description: 'Driven is being pulled by purpose rather than pushed by fear.',                  steps: ['Name your deepest why behind your biggest goal.', 'Write it somewhere you will see it every day.', 'Let that why guide your next three decisions.'] }
  ],
  E: [
    { word: 'Empowered',    description: 'Empowered is reclaiming the authority over your own story.',                   steps: ['Identify one place where you have been giving your power away.', 'Make one decision today that is entirely yours.', 'Notice how that feels in your body.'] },
    { word: 'Enthusiastic', description: 'Enthusiastic is letting what lights you up actually light you up.',             steps: ['Name one thing you are genuinely excited about right now.', 'Give it more of your energy today, not less.', 'Share that excitement with someone — it is contagious.'] },
    { word: 'Earnest',      description: 'Earnest is meaning every word you say and every promise you make.',             steps: ['Think of one commitment you have made that needs honouring.', 'Follow through on it today, without compromise.', 'Notice how integrity feels from the inside.'] },
    { word: 'Expansive',    description: 'Expansive is the willingness to grow beyond what currently feels possible.',   steps: ['Identify one belief that is keeping you contained.', 'Ask: what if that belief were simply wrong?', 'Spend five minutes imagining life without that limitation.'] },
    { word: 'Evolving',     description: 'Evolving is proof that who you are today is not a ceiling.',                   steps: ['Write down one way you have changed in the last year.', 'Celebrate that change — it took courage.', 'Ask: what would the next version of me do differently?'] }
  ],
  F: [
    { word: 'Fearless',   description: 'Fearless is not the absence of fear — it is the refusal to let it decide.',    steps: ['Name one thing fear is currently deciding for you.', 'Ask what you would do if you knew it would work out.', 'Do that thing, or one step toward it, today.'] },
    { word: 'Forgiving',  description: 'Forgiving is setting down a weight you were never meant to carry forever.',    steps: ['Name one resentment you are still holding.', 'Ask: what would it cost me to let this go?', 'Write a letter of release — you don\'t have to send it.'] },
    { word: 'Free',       description: 'Free is the version of you that lives without needing anyone\'s permission.',  steps: ['Name one thing you have been waiting for permission to do.', 'Grant yourself that permission now, in writing.', 'Act on it before the day ends.'] },
    { word: 'Fulfilled',  description: 'Fulfilled is knowing that what you do matters, and that you matter too.',      steps: ['Name three ways you contributed positively to someone\'s life this week.', 'Sit with that — it is enough.', 'Ask: what would feel more fulfilling, starting tomorrow?'] },
    { word: 'Faithful',   description: 'Faithful is trusting the process even when you cannot see the outcome.',       steps: ['Identify one area where you demand certainty before acting.', 'Take one step forward on faith alone.', 'Record what happens so you can look back on it.'] }
  ],
  G: [
    { word: 'Graceful',   description: 'Graceful is responding to difficulty without losing your elegance.',          steps: ['Notice one situation where you are reacting rather than responding.', 'Pause before your next response — just one breath.', 'Choose the version of yourself you are most proud of.'] },
    { word: 'Generous',   description: 'Generous is giving from your fullness, not from your fear of being liked.',   steps: ['Give something today without announcing it.', 'Notice the difference between giving freely and giving to be seen.', 'Choose the quiet kind.'] },
    { word: 'Grateful',   description: 'Grateful is turning what you have into enough.',                              steps: ['Write five things you are grateful for before you check your phone.', 'Tell one person today why you appreciate them.', 'End the day by noting one good thing that happened.'] },
    { word: 'Grounded',   description: 'Grounded is being fully present in your body while the world spins.',        steps: ['Take ten deep breaths before making any decision today.', 'Step outside and feel the ground beneath your feet.', 'Name five things you can see, four you can hear, three you can touch.'] },
    { word: 'Glowing',    description: 'Glowing is the radiance that comes from living in alignment.',               steps: ['Notice what drains your glow and name it honestly.', 'Reduce your exposure to that thing by just ten percent today.', 'Then notice what naturally begins to shine instead.'] }
  ],
  H: [
    { word: 'Healing',  description: 'Healing is not linear — but it is always happening if you allow it.',        steps: ['Acknowledge one wound you have been pretending is not there.', 'Give it one act of care today — rest, a conversation, a journal entry.', 'Trust the process even when progress is invisible.'] },
    { word: 'Hopeful',  description: 'Hopeful is choosing to believe in a future that hasn\'t arrived yet.',       steps: ['Write the best possible version of something you are uncertain about.', 'Let that version feel real for five minutes.', 'Take one action that moves toward it.'] },
    { word: 'Humble',   description: 'Humble is the strength to lead with curiosity rather than certainty.',       steps: ['Ask someone a genuine question today and truly listen.', 'Admit one thing you don\'t know and sit with the discomfort.', 'Let someone else be right today without making it smaller.'] },
    { word: 'Honest',   description: 'Honest is the foundation every real relationship is built on.',              steps: ['Name one thing you have been avoiding saying to yourself.', 'Write it down and look at it clearly.', 'Decide what you will do with that truth.'] },
    { word: 'Harmonic', description: 'Harmonic is when every part of your life is playing in tune.',               steps: ['Notice which areas of your life feel discordant right now.', 'Ask what one small change would bring more harmony.', 'Make that change today.'] }
  ],
  I: [
    { word: 'Inspired',     description: 'Inspired is the feeling that something bigger than you is pulling you forward.', steps: ['Spend ten minutes with art, music or nature that moves you.', 'Write down what stirs in you.', 'Let that feeling point you toward your next step.'] },
    { word: 'Intentional',  description: 'Intentional is doing things on purpose, for a purpose.',                        steps: ['Set a clear intention before each task today.', 'Ask: why am I doing this and what do I want from it?', 'Review at the end of the day whether you lived with intention.'] },
    { word: 'Intuitive',    description: 'Intuitive is knowing before knowing — and learning to trust that.',             steps: ['Notice your gut response to one decision you are sitting with.', 'Write it down before logic argues with it.', 'Consider it alongside the evidence, not instead of it.'] },
    { word: 'Invincible',   description: 'Invincible is not that nothing can hurt you — it is that nothing can stop you.', steps: ['Recall one thing you survived that you didn\'t think you would.', 'Write down what that proved about you.', 'Carry that evidence into today\'s challenges.'] },
    { word: 'Inclusive',    description: 'Inclusive is making room at the table for every kind of person.',               steps: ['Notice who is being left out in a space you are in.', 'Find one way to make them feel seen.', 'Ask yourself: what am I not hearing that I should be?'] }
  ],
  J: [
    { word: 'Joyful',    description: 'Joyful is a state you choose, not a circumstance you wait for.',              steps: ['Do one thing today purely because it brings you joy.', 'Notice the difference between pleasure and deep satisfaction.', 'Seek more of the latter.'] },
    { word: 'Jubilant',  description: 'Jubilant is celebrating without needing a reason grand enough.',              steps: ['Celebrate one small win from this week.', 'Do it out loud, even just to yourself.', 'Let celebration become a daily practice, not a reward.'] },
    { word: 'Just',      description: 'Just is the quiet courage to do what is right when it is inconvenient.',      steps: ['Notice one place where fairness or truth is being compromised.', 'Ask what doing the right thing would look like here.', 'Choose that, even if it costs you something.'] }
  ],
  K: [

/* ====================================================================
   SECTION 2 — LETTER CONFIGURATION
   ─────────────────────────────────────────────────────────────────
   accent : Colour for this letter's pointer, glow and word title.
            Cycles: pink → yellow → purple.
   image  : Path to letter illustration PNG/SVG. Leave '' for fallback letter.
            Example: 'images/letter-a.png'
==================================================================== */
const LETTER_CONFIG = {
  A: { accent: '#e73879', image: '' },  B: { accent: '#fcc737', image: '' },
  C: { accent: '#7e1891', image: '' },  D: { accent: '#e73879', image: '' },
  E: { accent: '#fcc737', image: '' },  F: { accent: '#7e1891', image: '' },
  G: { accent: '#e73879', image: '' },  H: { accent: '#fcc737', image: '' },
  I: { accent: '#7e1891', image: '' },  J: { accent: '#e73879', image: '' },
  K: { accent: '#fcc737', image: '' },  L: { accent: '#7e1891', image: '' },
  M: { accent: '#e73879', image: '' },  N: { accent: '#fcc737', image: '' },
  O: { accent: '#7e1891', image: '' },  P: { accent: '#e73879', image: '' },
  Q: { accent: '#fcc737', image: '' },  R: { accent: '#7e1891', image: '' },
  S: { accent: '#e73879', image: '' },  T: { accent: '#fcc737', image: '' },
  U: { accent: '#7e1891', image: '' },  V: { accent: '#e73879', image: '' },
  W: { accent: '#fcc737', image: '' },  X: { accent: '#7e1891', image: '' },
  Y: { accent: '#e73879', image: '' },  Z: { accent: '#fcc737', image: '' }
};

/* ====================================================================
   SECTION 3 — ENGINE
==================================================================== */
(function () {
  'use strict';

  /* Wheel always uses black/white alternating segments */
  var SEG_FILL = ['#000000', '#f2f2f2'];
  var SEG_TEXT = ['rgba(242,242,242,0.9)', 'rgba(0,0,0,0.85)'];

  /* ── State ─────────────────────────────────────────────────── */
  var curLetter = 'L';
  var rotation  = 0;
  var animating = false;
  var selIdx    = -1;
  var spinDone  = false;
  var navOpen   = false;

  var animFrom = 0, animTo = 0, animDur = 0;
  var animStart = null, animCb = null, animRaf = null;

  /* ── DOM ───────────────────────────────────────────────────── */
  var canvas      = document.getElementById('wheel-canvas');
  var ctx         = canvas.getContext('2d');
  var nav         = document.getElementById('letter-nav');
  var spinBtn     = document.getElementById('spin-btn');
  var switchBtn   = document.getElementById('switch-btn');
  var landedLbl   = document.getElementById('landed-label');
  var badgeLetter = document.getElementById('badge-letter');
  var listBadge   = document.getElementById('list-badge');
  var imgEl       = document.getElementById('letter-image');
  var fallback    = document.getElementById('letter-fallback');
  var overlay     = document.getElementById('center-overlay');
  var wrapper     = document.getElementById('wheel-wrapper');
  var emptyState  = document.getElementById('empty-state');
  var wordState   = document.getElementById('word-state');
  var wordTitle   = document.getElementById('word-title');
  var wordDesc    = document.getElementById('word-desc');
  var step1El     = document.getElementById('step-1');
  var step2El     = document.getElementById('step-2');
  var step3El     = document.getElementById('step-3');

  /* ── Sizing ────────────────────────────────────────────────── */
  var SIZE = 500;

  function syncSize () {
    var dpr  = window.devicePixelRatio || 1;
    var cssW = wrapper.clientWidth;
    SIZE = Math.round(cssW * dpr);
    canvas.width  = SIZE;
    canvas.height = SIZE;
    var innerCss = Math.round(SIZE * 0.165 * 2 / dpr);
    overlay.style.width  = innerCss + 'px';
    overlay.style.height = innerCss + 'px';
    fallback.style.fontSize = Math.round(innerCss * 0.52) + 'px';
    draw();
  }

  /* ── Nav ───────────────────────────────────────────────────── */
  function buildNav () {
    Object.keys(WORDS).forEach(function (l) {
      var btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.textContent = l;
      btn.dataset.letter = l;
      btn.setAttribute('aria-label', 'Letter ' + l);
      btn.addEventListener('click', function () { selectLetter(l); });
      nav.appendChild(btn);
    });
  }

  /* ── Select letter ─────────────────────────────────────────── */
  function selectLetter (l) {
    if (!WORDS[l]) return;
    curLetter = l;
    selIdx    = -1;
    spinDone  = false;

    var accent = (LETTER_CONFIG[l] || {}).accent || '#e73879';
    setAccent(accent);

    badgeLetter.textContent = l;
    listBadge.textContent   = l + ' List';

    var cfg = LETTER_CONFIG[l] || {};
    if (cfg.image) {
      imgEl.classList.remove('visible');
      imgEl.src     = cfg.image;
      imgEl.onload  = function () { imgEl.classList.add('visible'); };
      imgEl.onerror = function () { imgEl.classList.remove('visible'); resetFallback(l); };
      fallback.textContent = '';
    } else {
      imgEl.src = '';
      imgEl.classList.remove('visible');
      resetFallback(l);
    }

    document.querySelectorAll('.letter-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.letter === l);
    });

    hideWordState();
    beginSpin(rotation + Math.PI * 2 * 1.8, 1300, null);
    emit('letterChanged', { letter: l });
  }

  function resetFallback (l) {
    fallback.style.animation = 'none';
    fallback.textContent = l;
    requestAnimationFrame(function () { fallback.style.animation = ''; });
  }

  function setAccent (color) {
    document.documentElement.style.setProperty('--accent', color);
    var rgb = hexToRgb(color);
    if (rgb) {
      document.documentElement.style.setProperty('--accent-faint',
        'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.08)');
    }
    spinBtn.style.background  = color;
    spinBtn.style.borderColor = color;
  }

  /* ── Spin ──────────────────────────────────────────────────── */
  function doSpin () {
    if (animating) return;
    var entries = WORDS[curLetter];
    var n       = entries.length;
    var rnd     = Math.floor(Math.random() * n);
    selIdx      = rnd;
    var target  = computeTarget(rnd, n, rotation, 4 + Math.random() * 2);
    spinBtn.disabled = true;
    beginSpin(target, 4400, function () {
      spinBtn.disabled = false;
      spinDone = true;
      showWord(entries[rnd]);
    });
  }

  function computeTarget (wordIdx, n, curRot, minSpins) {
    var seg  = (2 * Math.PI) / n;
    var base = -Math.PI / 2 - wordIdx * seg - seg / 2;
    var min  = curRot + minSpins * 2 * Math.PI;
    var k    = Math.ceil((min - base) / (2 * Math.PI));
    return base + k * 2 * Math.PI;
  }

  /* ── Animation ─────────────────────────────────────────────── */
  function beginSpin (to, dur, cb) {
    if (animRaf) cancelAnimationFrame(animRaf);
    animating = true;
    animFrom  = rotation;
    animTo    = to;
    animDur   = dur;
    animStart = null;
    animCb    = cb;
    animRaf   = requestAnimationFrame(tick);
  }

  function tick (ts) {
    if (!animStart) animStart = ts;
    var t    = Math.min((ts - animStart) / animDur, 1);
    rotation = animFrom + (animTo - animFrom) * easeOutQuart(t);
    draw();
    if (t < 1) {
      animRaf = requestAnimationFrame(tick);
    } else {
      rotation  = animTo;
      animating = false;
      animRaf   = null;
      draw();
      if (animCb) animCb();
    }
  }

  function easeOutQuart (t) { return 1 - Math.pow(1 - t, 4); }

  /* ── Show word in panel ─────────────────────────────────────── */
  function showWord (entry) {
    wordTitle.textContent = entry.word;
    wordDesc.textContent  = entry.description;
    step1El.textContent   = entry.steps[0] || '';
    step2El.textContent   = entry.steps[1] || '';
    step3El.textContent   = entry.steps[2] || '';
    landedLbl.innerHTML   = 'Landed on: <span>' + entry.word + '</span>';

    emptyState.classList.add('hidden');
    wordState.style.display = 'flex';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { wordState.classList.add('visible'); });
    });
    emit('wordSelected', { letter: curLetter, word: entry.word });
  }

  function hideWordState () {
    wordState.classList.remove('visible');
    wordState.style.display = 'none';
    emptyState.classList.remove('hidden');
    landedLbl.innerHTML = '';
  }

  /* ── Pointer word index ────────────────────────────────────── */
  function wordAtPointer (n, seg) {
    var raw = ((-Math.PI / 2) - rotation) / seg;
    return ((Math.floor(raw) % n) + n) % n;
  }

  /* ── Draw ───────────────────────────────────────────────────── */
  function draw () {
    ctx.clearRect(0, 0, SIZE, SIZE);

    var cx     = SIZE / 2;
    var cy     = SIZE / 2;
    var outerR = SIZE * 0.455;
    var innerR = SIZE * 0.165;

    var entries = WORDS[curLetter] || [];
    var n       = entries.length;
    if (n === 0) return;

    var seg    = (2 * Math.PI) / n;
    var atPtr  = wordAtPointer(n, seg);
    var accent = (LETTER_CONFIG[curLetter] || {}).accent || '#e73879';

    /* Segments */
    for (var i = 0; i < n; i++) {
      var a0  = rotation + i * seg;
      var a1  = a0 + seg;
      var mid = a0 + seg / 2;
      var hi  = (i === atPtr && animating) || (spinDone && i === selIdx);

      ctx.save();
      if (hi) { ctx.shadowColor = accent; ctx.shadowBlur = SIZE * 0.04; }
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, outerR, a0, a1);
      ctx.closePath();
      ctx.fillStyle = hi ? lighten(SEG_FILL[i % 2], 25) : SEG_FILL[i % 2];
      ctx.fill();
      ctx.restore();

      /* Keyline separator */
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(a0);
      ctx.beginPath();
      ctx.moveTo(innerR, 0);
      ctx.lineTo(outerR, 0);
      ctx.strokeStyle = 'rgba(204,204,204,0.2)';
      ctx.lineWidth   = 1;
      ctx.stroke();
      ctx.restore();

      drawSegText(ctx, entries[i].word, cx, cy, innerR, outerR, mid, hi, i % 2, SIZE);
    }

    /* Outer accent rings */
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, outerR + SIZE * 0.014, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(accent, 0.28);
    ctx.lineWidth   = SIZE * 0.004;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, outerR + SIZE * 0.026, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(accent, 0.08);
    ctx.lineWidth   = SIZE * 0.003;
    ctx.stroke();
    ctx.restore();

    /* Centre circle */
    ctx.beginPath();
    ctx.arc(cx, cy, innerR + 2, 0, Math.PI * 2);
    ctx.fillStyle = '#000000';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(accent, 0.42);
    ctx.lineWidth   = SIZE * 0.005;
    ctx.stroke();

    drawPointer(ctx, cx, cy, outerR, SIZE, accent);
  }

  function drawSegText (ctx, word, cx, cy, innerR, outerR, midAngle, hi, segIdx, SIZE) {
    var textEdge = outerR - SIZE * 0.022;
    var maxW     = textEdge - innerR - SIZE * 0.01;
    var fs       = Math.min(SIZE * 0.027, 15);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(midAngle);
    ctx.font          = (hi ? '700 ' : '400 ') + fs + "px 'PT Sans', sans-serif";
    ctx.textAlign     = 'right';
    ctx.textBaseline  = 'middle';
    ctx.fillStyle     = hi ? (segIdx === 0 ? '#ffffff' : '#000000') : SEG_TEXT[segIdx];
    ctx.shadowColor   = segIdx === 0 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.1)';
    ctx.shadowBlur    = 3;

    var mw = ctx.measureText(word).width;
    if (mw > maxW) {
      var s = maxW / mw;
      ctx.scale(s, s);
      ctx.fillText(word, textEdge / s, 0);
    } else {
      ctx.fillText(word, textEdge, 0);
    }
    ctx.restore();
  }

  function drawPointer (ctx, cx, cy, outerR, SIZE, accent) {
    var tipY = cy - outerR + SIZE * 0.005;
    var pw   = SIZE * 0.025;
    var ph   = SIZE * 0.04;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = SIZE * 0.012;
    ctx.beginPath();
    ctx.moveTo(cx, tipY);
    ctx.lineTo(cx - pw, tipY - ph);
    ctx.lineTo(cx + pw, tipY - ph);
    ctx.closePath();
    ctx.fillStyle = '#f2f2f2';
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(cx, tipY - ph - SIZE * 0.006, SIZE * 0.009, 0, Math.PI * 2);
    ctx.fillStyle = accent;
    ctx.fill();
    ctx.restore();
  }

  /* ── Colour helpers ────────────────────────────────────────── */
  function hexToRgb (hex) {
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
  }

  function lighten (hex, amt) {
    var c = hexToRgb(hex);
    if (!c) return hex;
    return 'rgb(' + Math.min(255,c.r+amt) + ',' + Math.min(255,c.g+amt) + ',' + Math.min(255,c.b+amt) + ')';
  }

  function hexAlpha (hex, a) {
    var c = hexToRgb(hex);
    if (!c) return hex;
    return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
  }

  /* ── postMessage bridge ────────────────────────────────────── */
  function emit (type, payload) {
    try {
      if (window.parent !== window) {
        var msg = { type: type };
        Object.keys(payload || {}).forEach(function (k) { msg[k] = payload[k]; });
        window.parent.postMessage(msg, '*');
      }
    } catch (_) {}
  }

  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === 'selectLetter' && typeof d.letter === 'string')
      selectLetter(d.letter.trim().toUpperCase().charAt(0));
    else if (d.type === 'spin')     doSpin();
    else if (d.type === 'showNav')  { nav.classList.add('open');    switchBtn.classList.add('active');    navOpen = true;  }
    else if (d.type === 'hideNav')  { nav.classList.remove('open'); switchBtn.classList.remove('active'); navOpen = false; }
  });

  /* ── Switch list ───────────────────────────────────────────── */
  switchBtn.addEventListener('click', function () {
    navOpen = !navOpen;
    nav.classList.toggle('open', navOpen);
    switchBtn.classList.toggle('active', navOpen);
  });

  /* ── Init ──────────────────────────────────────────────────── */
  buildNav();
  spinBtn.addEventListener('click', doSpin);

  if (window.ResizeObserver) {
    new ResizeObserver(syncSize).observe(wrapper);
  } else {
    window.addEventListener('resize', syncSize);
  }

  syncSize();
  selectLetter('L');

}());
</script>
</body>
</html>
